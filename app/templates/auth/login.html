{% extends "base.html" %}
{% block title %}Connexion · Eternal Vanguard{% endblock %}
{% block content %}
<section class="max-w-md mx-auto px-6 py-16">
  <h1 class="font-display text-3xl mb-8">Connexion</h1>

  {% if error %}
  <div role="alert" class="mb-4 p-3 border border-red-700 bg-red-900/30 text-red-200 text-sm rounded">
    {{ error }}
  </div>
  {% endif %}

  <form method="post" action="/login" class="space-y-4">
    <input type="hidden" name="next" value="{{ next }}">
    <div>
      <label for="username" class="block text-sm text-secondary mb-1">Identifiant</label>
      <input id="username" name="username" type="text" required autocomplete="username"
             class="w-full px-3 py-2 bg-card border border-edge rounded text-primary">
    </div>
    <div>
      <label for="password" class="block text-sm text-secondary mb-1">Mot de passe</label>
      <input id="password" name="password" type="password" required autocomplete="current-password"
             class="w-full px-3 py-2 bg-card border border-edge rounded text-primary">
    </div>
    <button type="submit"
            class="w-full px-4 py-2 bg-cyan-600 hover:bg-cyan-500 text-white rounded transition-colors">
      Se connecter
    </button>
  </form>
</section>
{% endblock %}
